<ion-header [translucent]="true">
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>Caderneta Digital</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <app-child-selector></app-child-selector>

  <!-- Loading Skeleton -->
  <div *ngIf="loading">
    <ion-card class="skeleton-card">
      <ion-card-content style="text-align: center;">
        <ion-skeleton-text [animated]="true" style="width: 40%; height: 24px; margin: 0 auto;"></ion-skeleton-text>
        <ion-skeleton-text [animated]="true" style="width: 30%; height: 14px; margin: 8px auto 0;"></ion-skeleton-text>
      </ion-card-content>
    </ion-card>

    <ion-grid>
      <ion-row>
        <ion-col size-xs="4" *ngFor="let i of [1,2,3]">
          <ion-card class="skeleton-card">
            <ion-card-content style="text-align: center;">
              <ion-skeleton-text [animated]="true" style="width: 50%; height: 32px; margin: 0 auto;"></ion-skeleton-text>
              <ion-skeleton-text [animated]="true" style="width: 70%; height: 14px; margin: 8px auto 0;"></ion-skeleton-text>
            </ion-card-content>
          </ion-card>
        </ion-col>
      </ion-row>
    </ion-grid>

    <ion-card class="skeleton-card">
      <ion-card-content>
        <ion-skeleton-text [animated]="true" style="width: 30%; height: 12px;"></ion-skeleton-text>
        <ion-skeleton-text [animated]="true" style="width: 80%; height: 18px; margin-top: 8px;"></ion-skeleton-text>
        <ion-skeleton-text [animated]="true" style="width: 60%; height: 14px; margin-top: 8px;"></ion-skeleton-text>
      </ion-card-content>
    </ion-card>
  </div>

  <!-- Conteudo real -->
  <div *ngIf="selectedChild && !loading">
    <!-- Alerta de atraso -->
    <ion-card *ngIf="hasDelayed" color="danger" class="alert-card">
      <ion-card-content>
        <ion-icon name="warning-outline"></ion-icon>
        <span>{{ selectedChild.name }} possui {{ atrasadas }} vacina(s) atrasada(s)!</span>
      </ion-card-content>
    </ion-card>

    <!-- Info da crianca -->
    <ion-card class="info-card">
      <ion-card-content>
        <div class="info-icon">
          <ion-icon name="person-circle-outline"></ion-icon>
        </div>
        <h2>{{ selectedChild.name }}</h2>
        <p>{{ selectedChild.formattedAge }}</p>
      </ion-card-content>
    </ion-card>

    <!-- Contadores -->
    <ion-grid>
      <ion-row>
        <ion-col size-xs="4" size-md="4">
          <ion-card class="counter-card counter-success">
            <ion-card-content class="counter">
              <ion-icon name="checkmark-circle-outline" class="counter-icon success-icon"></ion-icon>
              <span class="counter-number">{{ concluidas }}</span>
              <span class="counter-label">Concluidas</span>
            </ion-card-content>
          </ion-card>
        </ion-col>
        <ion-col size-xs="4" size-md="4">
          <ion-card class="counter-card counter-warning">
            <ion-card-content class="counter">
              <ion-icon name="calendar-outline" class="counter-icon warning-icon"></ion-icon>
              <span class="counter-number">{{ agendadas }}</span>
              <span class="counter-label">Agendadas</span>
            </ion-card-content>
          </ion-card>
        </ion-col>
        <ion-col size-xs="4" size-md="4">
          <ion-card class="counter-card counter-danger">
            <ion-card-content class="counter">
              <ion-icon name="alert-circle-outline" class="counter-icon danger-icon"></ion-icon>
              <span class="counter-number">{{ atrasadas }}</span>
              <span class="counter-label">Atrasadas</span>
            </ion-card-content>
          </ion-card>
        </ion-col>
      </ion-row>
    </ion-grid>

    <!-- Campanhas ativas -->
    <div *ngIf="campaigns.length > 0" class="section-header">
      <ion-icon name="megaphone-outline" class="section-icon"></ion-icon>
      <ion-label>Campanhas Ativas</ion-label>
    </div>
    <app-campaign-banner
      *ngFor="let camp of campaigns"
      [campaign]="camp"
    ></app-campaign-banner>
  </div>
</ion-content>
